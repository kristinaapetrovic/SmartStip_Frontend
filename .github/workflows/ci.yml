name: React Vite CI

on:
  pull_request:
    branches: [ main ]
    types: [closed]
  workflow_dispatch:

jobs:

  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint || echo "Lint warnings ignored"

      - name: Build app
        run: npm run build

  test:
    runs-on: windows-latest

    steps:
      - name: Parallel job
        run: echo "Running parallel job (test simulation)"

  deploy:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Deploy simulation
        run: echo "Deploying after successful build"